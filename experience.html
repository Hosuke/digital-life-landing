<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>珀存 Amberify - 网页体验版</title>
    <meta name="description" content="Amberify 珀存网页体验版。用户可在网页内完成建档、上传、聊天体验，并稳定接收图片、语音和视频回传。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <script>
      (function () {
        var localHosts = new Set(['localhost', '127.0.0.1', '::1', '[::1]']);
        if (localHosts.has(window.location.hostname)) {
          document.write('<script src="config.local.js"><\\/script>');
        }
      })();
    </script>
    <script>
      (function () {
        var localHosts = new Set(['localhost', '127.0.0.1', '::1', '[::1]']);
        var isLocal = localHosts.has(window.location.hostname);
        var existingConfig = isLocal ? (window.DIGITAL_LIFE_CONFIG || {}) : {};
        window.DIGITAL_LIFE_CONFIG = Object.assign({
          controlPlaneBaseUrl: isLocal ? 'http://localhost:8787' : 'https://qqbot.qungan.com',
          manualSchedulingWechat: 'q517754526',
          manualSchedulingQq: '517754526',
          paidContactEmail: 'sukebeta@outlook.com'
        }, existingConfig);
      })();
    </script>
  </head>
  <body>
    <div id="experience-root"></div>
    <script type="module" src="/src/experience/main.tsx"></script>
  </body>
</html>
